<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peak Shaver Visualizer</title>
  <link rel="stylesheet" href="css/main.css">
  <!-- CDN libs -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <!-- Controls -->
  <div class="controls">
    <select id="ticker-select" title="Select asset"></select>
    <div class="sep"></div>
    <button id="btn-step-back" title="Step back">|◀</button>
    <button id="btn-play" title="Play/Pause (Space)">▶</button>
    <button id="btn-step-fwd" title="Step forward">▶|</button>
    <div class="sep"></div>
    <label>Step: <input type="number" id="step-size" value="1" min="1" max="50"></label>
    <label>Speed: <input type="range" id="speed-slider" min="1" max="200" value="100"></label>
    <div class="sep"></div>
    <span class="counter"><span id="step-counter">200</span> / <span id="step-total">0</span></span>
    <span class="kbd-hint">
      <kbd>←</kbd><kbd>→</kbd> step &nbsp; <kbd>Space</kbd> play
    </span>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric"><span class="label">Return:</span><span class="value" id="m-return">—</span></div>
    <div class="metric"><span class="label">B&amp;H:</span><span class="value" id="m-bnh">—</span></div>
    <div class="metric"><span class="label">Alpha:</span><span class="value" id="m-alpha">—</span></div>
    <div class="metric"><span class="label">Sharpe:</span><span class="value" id="m-sharpe">—</span></div>
    <div class="metric"><span class="label">Sortino:</span><span class="value" id="m-sortino">—</span></div>
    <div class="metric"><span class="label">MaxDD:</span><span class="value" id="m-dd">—</span></div>
    <div class="metric"><span class="label">Calmar:</span><span class="value" id="m-calmar">—</span></div>
  </div>

  <!-- Chart Panes -->
  <div class="chart-container">
    <div class="chart-pane" id="chart-price">
      <span class="pane-label">OHLC + SMA/EMA/BB</span>
    </div>
    <div class="chart-pane" id="chart-rsi">
      <span class="pane-label">RSI(14)</span>
    </div>
    <div class="chart-pane" id="chart-macd">
      <span class="pane-label">MACD(12,26,9)</span>
    </div>
    <div class="chart-pane" id="chart-volume">
      <span class="pane-label">Volume</span>
    </div>
  </div>

  <!-- Trade Popup -->
  <div class="trade-popup-overlay" id="trade-popup">
    <div class="trade-popup">
      <button class="popup-close" id="popup-close">&times;</button>
      <div id="popup-content"></div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading">Loading...</div>

  <!-- App -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
